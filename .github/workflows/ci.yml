name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ensure Maven Wrapper is executable
        run: chmod +x mvnw

      - name: Run tests with wrapper (fallback to mvn)
        run: |
          if ./mvnw -B -ntp -q -version; then
            ./mvnw -B -ntp -Dspring.profiles.active=test test
          else
            mvn -B -ntp -Dspring.profiles.active=test test
          fi
